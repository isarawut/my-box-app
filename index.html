<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="tab-title">My Box Emoji Scanner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500&display=swap');
        body { font-family: 'Kanit', sans-serif; background-color: #ffffff; -webkit-tap-highlight-color: transparent; }
        .box-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .hidden { display: none; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        #reader__scan_region { background: white !important; }
        video { border-radius: 20px !important; }
    </style>
</head>
<body class="max-w-md mx-auto min-h-screen relative bg-white overflow-x-hidden">

    <div id="app-content">
        <header class="p-6 bg-white sticky top-0 z-10 border-b border-gray-50">
            <div class="flex justify-between items-center mb-6">
                <div onclick="showRenameAppModal()" class="cursor-pointer group">
                    <h1 id="app-name-display" class="text-2xl font-bold text-gray-800 italic uppercase">MY BOX</h1>
                    <p class="text-[9px] text-gray-400 font-medium tracking-widest"><i class="fas fa-edit mr-1"></i>เปลี่ยนชื่อแอป</p>
                </div>
                <button onclick="startScanner()" class="w-12 h-12 bg-gray-900 text-white rounded-2xl flex items-center justify-center shadow-lg active:scale-90 transition">
                    <i class="fas fa-expand"></i>
                </button>
            </div>
            <div class="relative">
                <i class="fas fa-search absolute left-4 top-4 text-gray-300"></i>
                <input type="text" id="search" onkeyup="doSearch()" placeholder="ค้นหาของในกล่อง..." class="w-full p-4 pl-12 bg-gray-100 rounded-2xl text-sm border-none outline-none focus:ring-2 focus:ring-indigo-400">
            </div>
        </header>

        <div class="p-6 box-grid pb-40" id="grid-container"></div>

        <div class="fixed bottom-0 left-0 right-0 max-w-md mx-auto p-4 bg-white/90 backdrop-blur-md border-t border-gray-100 flex space-x-3 z-30">
            <button onclick="showAddBoxModal()" class="flex-1 bg-gray-100 text-gray-600 py-4 rounded-2xl font-bold text-sm flex items-center justify-center active:scale-95 transition">
                <i class="fas fa-plus mr-2"></i> เพิ่มกล่อง
            </button>
            <button onclick="generatePrintPage()" class="flex-1 bg-gradient-to-r from-red-500 to-purple-600 text-white py-4 rounded-2xl font-bold text-sm shadow-lg flex items-center justify-center active:scale-95 transition">
                <i class="fas fa-qrcode mr-2"></i> พิมพ์ QR
            </button>
        </div>
    </div>

    <div id="scanner-view" class="fixed inset-0 bg-black z-[100] hidden flex flex-col">
        <div class="p-6 flex justify-between items-center">
            <h2 class="text-white font-bold text-xl tracking-widest">SCAN QR CODE</h2>
            <button onclick="stopScanner()" class="w-10 h-10 bg-white/20 text-white rounded-full flex items-center justify-center">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <div class="flex-1 flex items-center justify-center p-6">
            <div id="reader" class="w-full overflow-hidden rounded-[40px]"></div>
        </div>
        <div class="p-10 text-center text-white/50 text-xs">
            วาง QR Code ให้อยู่ในกรอบเพื่อดูข้อมูลของในกล่อง
        </div>
    </div>

    <div id="drawer" class="fixed inset-0 bg-black/40 z-[60] hidden opacity-0 transition-opacity duration-300">
        <div class="absolute bottom-0 left-0 right-0 bg-white rounded-t-[40px] p-8 max-h-[85vh] overflow-y-auto no-scrollbar">
            <div class="w-12 h-1.5 bg-gray-200 rounded-full mx-auto mb-6"></div>
            <div class="flex justify-between items-start mb-6">
                <div class="flex items-center space-x-3">
                    <div id="drawer-emoji" class="text-3xl">📦</div>
                    <div>
                        <span id="drawer-id-label" class="text-[10px] font-black text-gray-300 uppercase tracking-tighter">B-01</span>
                        <h2 id="drawer-name-display" class="text-2xl font-bold text-gray-800 leading-tight">ชื่อกล่อง</h2>
                    </div>
                </div>
                <button onclick="openProfileDrawer()" class="bg-gray-100 w-12 h-12 rounded-2xl text-gray-400 flex items-center justify-center active:bg-gray-200 transition">
                    <i class="fas fa-cog"></i>
                </button>
            </div>
            <div id="item-inputs" class="space-y-3"></div>
            <button onclick="addNewItemInput('')" class="w-full mt-4 py-4 border-2 border-dashed border-gray-100 rounded-2xl text-gray-400 text-sm">+ เพิ่มรายการ</button>
            <button onclick="saveItems()" class="w-full mt-6 bg-gray-900 text-white py-4 rounded-2xl font-bold shadow-xl">บันทึก</button>
            <button onclick="closeDrawer()" class="w-full mt-2 py-4 text-gray-300 text-sm text-center">ปิด</button>
        </div>
    </div>

    <div id="modal-app-name" class="fixed inset-0 bg-black/60 z-[110] hidden flex items-center justify-center p-6 backdrop-blur-sm">
        <div class="bg-white w-full rounded-3xl p-6 shadow-2xl">
            <h3 class="text-xl font-bold mb-4 text-gray-800 text-center">ตั้งชื่อแอป</h3>
            <input type="text" id="new-app-name" class="w-full p-4 bg-gray-50 rounded-xl outline-none border border-gray-100 focus:border-indigo-400 uppercase font-bold text-center text-xl">
            <div class="flex space-x-3 mt-6">
                <button onclick="hideRenameAppModal()" class="flex-1 py-4 text-gray-400 font-bold">ยกเลิก</button>
                <button onclick="saveAppName()" class="flex-1 bg-gray-900 text-white py-4 rounded-2xl font-bold">บันทึก</button>
            </div>
        </div>
    </div>

    <div id="drawer-profile" class="fixed inset-0 bg-black/40 z-[70] hidden opacity-0 transition-opacity">
        <div class="absolute bottom-0 left-0 right-0 bg-white rounded-t-[40px] p-8 max-h-[85vh] overflow-y-auto no-scrollbar">
            <div class="w-12 h-1.5 bg-gray-200 rounded-full mx-auto mb-6"></div>
            <h2 class="text-2xl font-bold mb-6 text-gray-800">ตั้งค่ากล่อง</h2>
            <div class="space-y-4">
                <div class="flex items-center space-x-4">
                    <div id="emoji-preview" class="w-16 h-16 bg-gray-50 rounded-2xl border flex items-center justify-center text-3xl">📦</div>
                    <input type="text" id="edit-box-emoji" maxlength="2" class="flex-1 p-4 bg-gray-50 rounded-xl border border-gray-100 text-center text-2xl outline-none focus:border-indigo-400">
                </div>
                <input type="text" id="edit-box-name" class="w-full p-4 bg-gray-50 rounded-xl border border-gray-100 outline-none focus:border-indigo-400">
            </div>
            <div class="flex space-x-3 mt-10">
                <button onclick="closeProfileDrawer()" class="flex-1 py-4 text-gray-400 font-bold">ยกเลิก</button>
                <button onclick="saveBoxProfile()" class="flex-1 bg-indigo-600 text-white py-4 rounded-2xl font-bold shadow-lg">บันทึก</button>
            </div>
        </div>
    </div>

    <div id="modal-add" class="fixed inset-0 bg-black/60 z-[110] hidden flex items-center justify-center p-6 backdrop-blur-sm">
        <div class="bg-white w-full rounded-3xl p-6 shadow-2xl">
            <h3 class="text-xl font-bold mb-4 text-gray-800">เพิ่มกล่องใหม่</h3>
            <div class="space-y-4">
                <input type="text" id="new-id" class="w-full p-4 bg-gray-100 rounded-xl border border-gray-100 font-bold text-gray-400" readonly>
                <input type="text" id="new-name" placeholder="ระบุชื่อกล่อง..." class="w-full p-4 bg-gray-50 rounded-xl border border-gray-100 outline-none focus:border-indigo-400">
            </div>
            <div class="flex space-x-3 mt-6">
                <button onclick="hideAddBoxModal()" class="flex-1 py-4 text-gray-400 font-bold">ยกเลิก</button>
                <button onclick="confirmAddBox()" class="flex-1 bg-indigo-600 text-white py-4 rounded-2xl font-bold">ตกลง</button>
            </div>
        </div>
    </div>

    <div id="print-view" class="hidden min-h-screen bg-white p-4">
        <div class="mb-6 flex justify-between items-center bg-gray-900 p-4 rounded-2xl text-white">
            <button onclick="location.reload()" class="font-bold"><i class="fas fa-arrow-left mr-2"></i>กลับ</button>
            <button onclick="window.print()" class="bg-indigo-500 px-6 py-2 rounded-xl font-bold">สั่งพิมพ์</button>
        </div>
        <div id="qr-print-grid" class="grid grid-cols-2 gap-4"></div>
    </div>

    <script>
        let boxes = JSON.parse(localStorage.getItem('mybox_final_v3')) || [];
        let appName = localStorage.getItem('mybox_app_name') || 'MY BOX';
        let currentBoxId = '';
        let html5QrCode;

        function updateAppDisplay() {
            document.getElementById('app-name-display').innerText = appName;
            document.getElementById('tab-title').innerText = appName;
        }

        // --- ระบบสแกนเนอร์ ---
        function startScanner() {
            document.getElementById('scanner-view').classList.remove('hidden');
            html5QrCode = new Html5Qrcode("reader");
            const config = { fps: 10, qrbox: { width: 250, height: 250 } };
            
            html5QrCode.start({ facingMode: "environment" }, config, (decodedText) => {
                // เมื่อสแกนเจอข้อความ (รหัสกล่อง)
                stopScanner();
                handleScanResult(decodedText.trim().toUpperCase());
            }).catch(err => {
                console.error("Camera error:", err);
                alert("ไม่สามารถเข้าถึงกล้องได้");
                stopScanner();
            });
        }

        function stopScanner() {
            if (html5QrCode) {
                html5QrCode.stop().then(() => {
                    document.getElementById('scanner-view').classList.add('hidden');
                }).catch(err => console.log(err));
            } else {
                document.getElementById('scanner-view').classList.add('hidden');
            }
        }

        function handleScanResult(boxId) {
            const box = boxes.find(b => b.id === boxId);
            if (box) {
                openBox(boxId); // เปิดข้อมูลกล่องที่แสกนเจอ
            } else {
                alert(`ไม่พบข้อมูลกล่องรหัส: ${boxId}`);
            }
        }

        // --- ส่วนจัดการกล่อง (เหมือนเดิมแต่ยึดค่าที่แสกนได้) ---
        function getRainbowColor(updatedTime) {
            const sortedTimes = boxes.map(b => b.updated).sort((a, b) => b - a);
            const rank = sortedTimes.indexOf(updatedTime);
            const total = sortedTimes.length;
            const hue = total <= 1 ? 210 : (rank / (total - 1)) * 280;
            return `hsl(${hue}, 80%, 55%)`;
        }

        function renderGrid() {
            const container = document.getElementById('grid-container');
            container.innerHTML = '';
            const sortedBoxes = [...boxes].sort((a, b) => b.updated - a.updated);
            sortedBoxes.forEach(box => {
                const color = getRainbowColor(box.updated);
                container.innerHTML += `
                    <div onclick="openBox('${box.id}')" class="flex flex-col items-center relative active:scale-95 transition-all">
                        <div class="absolute -top-1 -right-1 min-w-[22px] h-[22px] px-1 text-white text-[9px] font-black rounded-full border-2 border-white flex items-center justify-center shadow-sm z-10" style="background-color: ${color}">${box.items.length}</div>
                        <div class="w-full aspect-square bg-white border-2 rounded-[32px] flex items-center justify-center mb-1.5 shadow-sm" style="border-color: ${color}22; background-color: ${color}08">
                            <span class="text-4xl">${box.emoji || '📦'}</span>
                        </div>
                        <span class="text-[10px] font-bold text-gray-700 text-center truncate w-full px-1">${box.name}</span>
                        <span class="text-[8px] font-black text-gray-300 uppercase">${box.id}</span>
                    </div>`;
            });
            localStorage.setItem('mybox_final_v3', JSON.stringify(boxes));
        }

        function openBox(id) {
            currentBoxId = id;
            const box = boxes.find(b => b.id === id);
            if(!box) return;
            document.getElementById('drawer-emoji').innerText = box.emoji || '📦';
            document.getElementById('drawer-id-label').innerText = `ID: ${box.id}`;
            document.getElementById('drawer-name-display').innerText = box.name;
            const container = document.getElementById('item-inputs');
            container.innerHTML = '';
            box.items.forEach(it => addNewItemInput(it));
            if(box.items.length === 0) addNewItemInput('');
            const d = document.getElementById('drawer');
            d.classList.remove('hidden');
            setTimeout(() => d.classList.add('opacity-100'), 10);
        }

        function addNewItemInput(val) {
            const div = document.createElement('div');
            div.innerHTML = `<input type="text" value="${val}" class="item-input w-full p-4 bg-gray-50 rounded-2xl border-none outline-none focus:ring-1 focus:ring-indigo-400" placeholder="ระบุของ...">`;
            document.getElementById('item-inputs').appendChild(div);
        }

        function saveItems() {
            const inputs = document.querySelectorAll('.item-input');
            const items = Array.from(inputs).map(i => i.value).filter(v => v.trim() !== '');
            const box = boxes.find(b => b.id === currentBoxId);
            box.items = items;
            box.updated = Date.now();
            renderGrid();
            closeDrawer();
        }

        function closeDrawer() {
            const d = document.getElementById('drawer');
            d.classList.remove('opacity-100');
            setTimeout(() => d.classList.add('hidden'), 300);
        }

        // --- ส่วนที่เหลือ (Profile, Add Box, Rename App) ---
        function openProfileDrawer() {
            const box = boxes.find(b => b.id === currentBoxId);
            document.getElementById('edit-box-name').value = box.name;
            document.getElementById('edit-box-emoji').value = box.emoji || '📦';
            document.getElementById('emoji-preview').innerText = box.emoji || '📦';
            const dp = document.getElementById('drawer-profile');
            dp.classList.remove('hidden');
            setTimeout(() => dp.classList.add('opacity-100'), 10);
        }

        function closeProfileDrawer() {
            const dp = document.getElementById('drawer-profile');
            dp.classList.remove('opacity-100');
            setTimeout(() => dp.classList.add('hidden'), 300);
        }

        function saveBoxProfile() {
            const box = boxes.find(b => b.id === currentBoxId);
            box.name = document.getElementById('edit-box-name').value.trim();
            box.emoji = document.getElementById('edit-box-emoji').value.trim() || '📦';
            box.updated = Date.now();
            renderGrid();
            closeProfileDrawer();
            openBox(currentBoxId);
        }

        function generateAutoId() {
            if (boxes.length === 0) return "B-01";
            const ids = boxes.map(b => parseInt(b.id.replace('B-', ''))).sort((a, b) => b - a);
            return `B-${String(ids[0] + 1).padStart(2, '0')}`;
        }

        function showAddBoxModal() {
            document.getElementById('new-id').value = generateAutoId();
            document.getElementById('modal-add').classList.remove('hidden');
        }
        function hideAddBoxModal() { document.getElementById('modal-add').classList.add('hidden'); }
        function confirmAddBox() {
            const id = document.getElementById('new-id').value;
            const name = document.getElementById('new-name').value.trim() || "กล่องใหม่";
            boxes.push({ id, name, items: [], updated: Date.now(), emoji: '📦' });
            renderGrid();
            hideAddBoxModal();
            document.getElementById('new-name').value = '';
        }

        function generatePrintPage() {
            document.getElementById('app-content').classList.add('hidden');
            document.getElementById('print-view').classList.remove('hidden');
            const grid = document.getElementById('qr-print-grid');
            grid.innerHTML = '';
            boxes.forEach(box => {
                const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${box.id}`;
                grid.innerHTML += `
                    <div class="border-2 border-dashed border-gray-100 p-4 flex flex-col items-center rounded-3xl">
                        <div class="text-[8px] text-gray-400 font-bold mb-1">${appName}</div>
                        <div class="text-2xl mb-1">${box.emoji}</div>
                        <img src="${qrUrl}" class="w-24 h-24 mb-2">
                        <div class="text-xs font-bold">${box.id}</div>
                        <div class="text-[8px] text-gray-500 truncate w-full text-center">${box.name}</div>
                    </div>`;
            });
        }

        function showRenameAppModal() {
            document.getElementById('new-app-name').value = appName;
            document.getElementById('modal-app-name').classList.remove('hidden');
        }
        function hideRenameAppModal() { document.getElementById('modal-app-name').classList.add('hidden'); }
        function saveAppName() {
            const name = document.getElementById('new-app-name').value.trim().toUpperCase();
            if(name) { appName = name; localStorage.setItem('mybox_app_name', appName); updateAppDisplay(); }
            hideRenameAppModal();
        }

        updateAppDisplay();
        renderGrid();
    </script>
</body>
</html>
